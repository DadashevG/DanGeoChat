<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Chat - Stage A</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map-section {
            flex: 1;
            background: white;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
        }

        #map {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .info-box {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 400;
            max-width: 220px;
            font-size: 12px;
        }

        .chat-section {
            width: 380px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-in;
        }

        .message.user {
            text-align: right;
        }

        .message.assistant {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        /* Markdown rendering inside assistant messages */
        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3 {
            font-size: 13px;
            font-weight: bold;
            margin: 6px 0 3px;
            color: #444;
        }
        .message.assistant .message-content p { margin: 4px 0; }
        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 4px 0 4px 16px;
            padding: 0;
        }
        .message.assistant .message-content li { margin: 2px 0; }
        .message.assistant .message-content strong { font-weight: 600; }
        .message.assistant .message-content em { font-style: italic; }
        .message.assistant .message-content hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 6px 0;
        }
        .message.assistant .message-content code {
            background: #f4f4f4;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 11px;
            font-family: monospace;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .chat-input-section {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            background: white;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        #question {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            resize: none;
            font-family: inherit;
            direction: rtl;
        }

        #question:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-toggle {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            white-space: nowrap;
        }

        .btn-toggle.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }

        .btn-toggle:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        .location-display {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .location-display strong {
            color: #333;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
            margin-left: 4px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .stage-badge {
            display: inline-block;
            background: #ffc107;
            color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-top: 10px;
        }


        .toggle-note {
            color: #777;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .server-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            text-align: center;
        }
        .server-status.ok  { background: #d4edda; color: #155724; }
        .server-status.err { background: #f8d7da; color: #721c24; }

        /* ── MCP Panel ────────────────────────────────── */
        .btn-mcp {
            background: #20c997;
            color: white;
            border: none;
            white-space: nowrap;
        }
        .btn-mcp:hover { background: #17a589; }
        .btn-mcp.active {
            background: #0e8c6a;
            box-shadow: 0 0 0 3px rgba(32,201,151,0.35);
        }

        .mcp-panel {
            display: none;
            background: #f0faf6;
            border: 1px solid #a8dfc9;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            animation: fadeIn 0.2s ease;
        }
        .mcp-panel.open { display: block; }

        .mcp-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #0e8c6a;
        }
        .mcp-select-all {
            font-size: 10px;
            background: none;
            border: 1px solid #a8dfc9;
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            color: #0e8c6a;
        }
        .mcp-select-all:hover { background: #d0f0e4; }

        .mcp-tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 10px;
        }
        .mcp-tool-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            cursor: pointer;
            padding: 3px 0;
        }
        .mcp-tool-item input[type="checkbox"] { cursor: pointer; accent-color: #20c997; }

        .msg-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 3px 8px;
            background: #f5f0ff;
            border: 1px solid #d8c8f8;
            border-radius: 20px;
            font-size: 10px;
            color: #6b4fa8;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .msg-badge img { height: 11px; vertical-align: middle; }
        .msg-badge .sep { color: #c0a8e8; }

        /* ── Toolbar row ─────────────────────────────── */
        .toolbar-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }
        .toolbar-row .btn {
            flex: 1;
            padding: 8px 6px;
            font-size: 12px;
            white-space: nowrap;
            min-width: 0;
        }

        /* ── GNN Button + Panel ─────────────────────── */
        .btn-gnn {
            background: #6f42c1;
            color: white;
            border: none;
        }
        .btn-gnn:hover:not(:disabled) { background: #5a32a3; }
        .btn-gnn.active {
            background: #4a1fa0;
            box-shadow: 0 0 0 3px rgba(111,66,193,0.35);
        }
        .btn-gnn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .gnn-panel {
            display: none;
            background: #f5f0ff;
            border: 1px solid #c8b4f0;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            animation: fadeIn 0.2s ease;
        }
        .gnn-panel.open { display: block; }

        .gnn-panel-header {
            font-size: 12px;
            font-weight: bold;
            color: #5a32a3;
            margin-bottom: 8px;
        }
        .gnn-options-row {
            display: flex;
            gap: 16px;
            font-size: 12px;
        }
        .gnn-option-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .gnn-option-item input { cursor: pointer; accent-color: #6f42c1; }
        .gnn-model-note {
            margin-top: 7px;
            font-size: 10px;
            color: #7c5cbf;
        }

        .gnn-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 3px 8px;
            background: #f0ebff;
            border: 1px solid #c8b4f0;
            border-radius: 20px;
            font-size: 10px;
            color: #5a32a3;
            font-weight: 500;
        }

        /* ── Exam Modal ─────────────────────────────── */
        .btn-exam {
            background: #fd7e14;
            color: white;
            border: none;
            white-space: nowrap;
        }
        .btn-exam:hover { background: #e8690d; }

        .exam-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }

        .exam-modal {
            background: white;
            border-radius: 12px;
            width: min(720px, 95vw);
            height: min(85vh, 700px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            direction: rtl;
        }

        .exam-header {
            background: linear-gradient(135deg, #fd7e14, #e05c00);
            color: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 15px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .exam-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .exam-close:hover { background: rgba(255,255,255,0.35); }

        .exam-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 10px;
        }

        .exam-places-section {
            flex-shrink: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .exam-section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }

        .exam-toggle-all {
            font-size: 10px;
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            color: #555;
        }
        .exam-toggle-all:hover { background: #f0f0f0; }

        .exam-places-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 3px 8px;
        }

        .exam-place-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 0;
            overflow: hidden;
        }
        .exam-place-item input[type="checkbox"] {
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #fd7e14;
        }
        .exam-place-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .exam-controls-row {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exam-question-label {
            font-size: 11px;
            color: #666;
            white-space: nowrap;
        }

        .exam-question-select {
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 5px 8px;
            direction: rtl;
            flex: 1;
        }

        .exam-progress-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exam-progress-bar {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .exam-progress-fill {
            height: 100%;
            background: #fd7e14;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .exam-progress-text {
            font-size: 11px;
            color: #666;
            white-space: nowrap;
            min-width: 100px;
            text-align: left;
        }

        .exam-run-btn { white-space: nowrap; flex-shrink: 0; }

        .exam-results {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .exam-result-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .exam-result-card.exam-pending { border-color: #ddd; background: #fafafa; }
        .exam-result-card.exam-done    { border-color: #a8dfc9; background: #f0faf6; }
        .exam-result-card.exam-error   { border-color: #f5c6cb; background: #fff5f5; }

        .exam-result-header {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        .exam-result-header small { color: #888; font-weight: normal; margin-right: 4px; }

        .exam-result-body { color: #444; line-height: 1.4; }
        .exam-result-body p { margin: 2px 0; }
        .exam-result-body ul, .exam-result-body ol { margin: 2px 0 2px 14px; padding: 0; }
        .exam-result-body li { margin: 1px 0; }

        .exam-result-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            padding: 2px 6px;
            background: #f5f0ff;
            border: 1px solid #d8c8f8;
            border-radius: 20px;
            font-size: 10px;
            color: #6b4fa8;
        }

        .exam-tools-section {
            flex-shrink: 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 10px;
        }
        .exam-tools-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .exam-tool-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .exam-tool-item input[type="checkbox"] {
            cursor: pointer;
            accent-color: #20c997;
        }
        .exam-tool-web input[type="checkbox"] {
            accent-color: #667eea;
        }

        .exam-runs-input {
            width: 52px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 5px 6px;
            font-size: 13px;
            text-align: center;
            flex-shrink: 0;
        }
        .exam-run-sep {
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: #667eea;
            background: #f0f0ff;
            border-radius: 6px;
            padding: 5px 10px;
            margin: 2px 0;
            flex-shrink: 0;
        }
        .run-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 10px;
            margin-left: 5px;
            font-weight: normal;
            vertical-align: middle;
        }
        .exam-judge-row {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-judge {
            background: #6f42c1;
            color: white;
            border: none;
            white-space: nowrap;
        }
        .btn-judge:hover { background: #5a32a3; }
        .btn-judge:disabled { background: #ccc; cursor: not-allowed; }

        .exam-judge-status {
            font-size: 11px;
            color: #666;
            flex: 1;
        }
        .exam-judge-progress {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Map on the right (since RTL) -->
        <div class="chat-section">
            <div class="chat-header">
                <h1>Map Chat</h1>
            </div>

            <div class="chat-messages" id="messages"></div>

            <div class="chat-input-section">
                <div id="locationDisplay" class="location-display" style="display: none;">
                    <strong>מיקום:</strong> <span id="coordsText"></span>
                </div>


                <div class="server-status err" id="serverStatus">⏳ בודק חיבור לשרת...</div>
                <div class="toggle-note" id="toggleLabel">חיפוש אינטרנט: כבוי</div>

                <!-- MCP Tool Panel -->
                <div class="mcp-panel" id="mcpPanel">
                    <div class="mcp-panel-header">
                        <span>🧰 כלי Geospatial — Google + Wikipedia</span>
                        <button class="mcp-select-all" onclick="toggleAllTools()">בחר הכל</button>
                    </div>
                    <div class="mcp-tools-grid">
                        <label class="mcp-tool-item">
                            <input type="checkbox" value="google" onchange="updateMcpState()">
                            🏙️ מקומות קרובים
                        </label>
                        <label class="mcp-tool-item">
                            <input type="checkbox" value="transit" onchange="updateMcpState()">
                            🚌 תחבורה קרובה
                        </label>
                        <label class="mcp-tool-item">
                            <input type="checkbox" value="get_wikipedia_context" onchange="updateMcpState()">
                            📖 Wikipedia
                        </label>
                    </div>
                </div>

                <!-- GNN Panel -->
                <div class="gnn-panel" id="gnnPanel">
                    <div class="gnn-panel-header">🧠 ניתוח GNN — תל אביב-יפו</div>
                    <div class="gnn-options-row">
                        <label class="gnn-option-item">
                            <input type="radio" name="gnnOption" value="gnn" checked> GNN בלבד
                        </label>
                        <label class="gnn-option-item">
                            <input type="radio" name="gnnOption" value="gnn_wiki"> GNN + Wikipedia
                        </label>
                        <label class="gnn-option-item">
                            <input type="radio" name="gnnOption" value="gnn_mcp"> GNN + כל הכלים
                        </label>
                    </div>
                </div>

                <div class="toolbar-row">
                    <button class="btn btn-mcp" onclick="toggleMcpPanel()" id="mcpBtn">🧰 MCP</button>
                    <button class="btn btn-gnn" onclick="toggleGnnPanel()" id="gnnBtn" disabled title="בחר נקודה בתל אביב-יפו">🧠 GNN</button>
                    <button class="btn btn-toggle" onclick="toggleWebSearch()" id="webToggleBtn">🌐 OFF</button>
                    <button class="btn btn-exam" onclick="openExamModal()">🧪 בדיקה</button>
                </div>

                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" onclick="askQuestion('מה יש כאן?')" id="sendBtn" style="flex:1">
                        מה יש כאן?
                    </button>
                    <button class="btn btn-primary" onclick="askQuestion('מה יש כאן תחבורתית?')" id="sendBtn2" style="flex:1; background:#764ba2;">
                        מה יש כאן תחבורתית?
                    </button>
                </div>

                <div class="stage-badge" id="stageBadge">
                    ⚠️ שלב א׳: LLM בלבד
                </div>
            </div>
        </div>

        <!-- Map on the left -->
        <div class="map-section">
            <div id="map"></div>
            <div class="info-box">
                <strong>לחץ על המפה</strong><br/>
                בחר נקודה להתחיל
            </div>
        </div>
    </div>

    <!-- Exam Modal -->
    <div class="exam-overlay" id="examOverlay" onclick="examOverlayClick(event)">
        <div class="exam-modal" id="examModal">
            <div class="exam-header">
                <span>🧪 בדיקה — 30 מקומות</span>
                <button class="exam-close" onclick="closeExamModal()">✕</button>
            </div>
            <div class="exam-body">
                <div class="exam-places-section">

    <script>
        const API_BASE = "http://localhost:8010";

        // Tel Aviv-Yafo trained bounding box
        const GNN_BOUNDS = { latMin: 31.99, latMax: 32.16, lonMin: 34.73, lonMax: 34.87 };

        function isInGnnArea(lat, lon) {
            return lat >= GNN_BOUNDS.latMin && lat <= GNN_BOUNDS.latMax &&
                   lon >= GNN_BOUNDS.lonMin && lon <= GNN_BOUNDS.lonMax;
        }

        function updateGnnButton() {
            const btn = document.getElementById('gnnBtn');
            if (!selectedLocation || !isInGnnArea(selectedLocation.lat, selectedLocation.lon)) {
                btn.disabled = true;
                btn.title = 'בחר נקודה בתל אביב-יפו להפעלה';
                if (useGnnMode) { useGnnMode = false; btn.classList.remove('active'); updateToggleUI(); }
            } else {
                btn.disabled = false;
                btn.title = 'הפעל ניתוח GNN לנקודה זו';
            }
        }

        function toggleGnnPanel() {
            const panel = document.getElementById('gnnPanel');
            const isOpening = !panel.classList.contains('open');
            panel.classList.toggle('open', isOpening);
            useGnnMode = isOpening;
            document.getElementById('gnnBtn').classList.toggle('active', useGnnMode);
            if (useGnnMode) {
                // GNN is exclusive — close MCP panel and clear web search
                useMcpMode = false;
                useWebSearch = false;
                document.querySelectorAll('#mcpPanel input[type="checkbox"]').forEach(cb => cb.checked = false);
                document.getElementById('mcpPanel').classList.remove('open');
                document.getElementById('mcpBtn').classList.remove('active');
            }
            updateToggleUI();
        }

        function getGnnEnabledTools() {
            const option = document.querySelector('input[name="gnnOption"]:checked')?.value || 'gnn';
            if (option === 'gnn_wiki') return ['get_wikipedia_context'];
            if (option === 'gnn_mcp') return ['reverse_geocode', 'get_nearby_places', 'get_nearby_transit', 'get_wikipedia_context'];
            return [];
        }

        function getGnnScenarioType() {
            const option = document.querySelector('input[name="gnnOption"]:checked')?.value || 'gnn';
            return option === 'gnn_mcp' ? 'gnn_mcp' : 'gnn';
        }

        const GOOGLE_TOOLS = ['reverse_geocode', 'get_area_info', 'get_nearby_places', 'get_distance', 'search_places'];
        const TRANSIT_TOOLS = ['get_nearby_transit'];

        function getEnabledTools() {
            const tools = [];
            document.querySelectorAll('#mcpPanel input[type="checkbox"]:checked').forEach(cb => {
                if (cb.value === 'google') tools.push(...GOOGLE_TOOLS);
                else if (cb.value === 'transit') tools.push(...TRANSIT_TOOLS);
                else tools.push(cb.value);
            });
            return tools;
        }

        function updateMcpState() {
            useMcpMode = getEnabledTools().length > 0;
            document.getElementById('mcpBtn').classList.toggle('active', useMcpMode);
            updateToggleUI();
        }

        function toggleMcpPanel() {
            document.getElementById('mcpPanel').classList.toggle('open');
        }

        function toggleAllTools() {
            const boxes = document.querySelectorAll('#mcpPanel input[type="checkbox"]');
            const allChecked = Array.from(boxes).every(cb => cb.checked);
            boxes.forEach(cb => { cb.checked = !allChecked; });
            updateMcpState();
        }

                document.getElementById('toggleLabel').textContent = `🧰 MCP: ${parts.join(' + ')} + 🌐 Web`;
                document.getElementById('stageBadge').textContent = '🧰 MCP + 🌐 Web';
            } else if (useMcpMode) {
                const parts = Array.from(document.querySelectorAll('#mcpPanel input[type="checkbox"]:checked'))
                    .map(cb => ({ google: '🏙️ Google', transit: '🚌 Transit', get_wikipedia_context: '📖 Wikipedia' })[cb.value] || cb.value);
                document.getElementById('toggleLabel').textContent = `🧰 MCP: ${parts.join(' + ')}`;
                document.getElementById('stageBadge').textContent = '🧰 שלב ב׳: Geospatial MCP';
            } else if (useGnnMode) {
                document.getElementById('toggleLabel').textContent = '🧠 GNN: ניתוח רשת תחבורה (תל אביב-יפו)';

                document.getElementById('stageBadge').textContent = '⚠️ שלב א׳: LLM בלבד';

        function initMap() {

        function displayCoordinates() {
            document.getElementById('locationDisplay').style.display = 'block';
            const inArea = isInGnnArea(selectedLocation.lat, selectedLocation.lon);

        async function askQuestion(question = 'מה יש כאן?') {
            if (!selectedLocation) {
                alert('בחר נקודה על המפה קודם');
                return;
            }

            addMessage(question, 'user');
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn2').disabled = true;

            // Show loading message
            const loadingMessage = addMessage('מחשב תשובה...', 'assistant', true);

            // MCP calls can take longer (multiple API round-trips + Wikipedia)
            const timeoutMs = useGnnMode ? 120000 : useMcpMode ? 90000 : 20000;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

            try {
                const enabledTools = useGnnMode  ? getGnnEnabledTools()
                    : useMcpMode                 ? getEnabledTools()
                    : [];
                const scenarioType = useGnnMode  ? getGnnScenarioType()
                    : useMcpMode                 ? 'mcp'
                    : useWebSearch               ? 'web_grounded'
                    : 'baseline';

                const response = await fetch(`${API_BASE}/api/v1/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        lat: selectedLocation.lat,
                        lon: selectedLocation.lon,
                        question: question,
                        scenario_type: scenarioType,
                        enabled_tools: enabledTools,
                        use_web_search: useWebSearch,
                    })
                });
                clearTimeout(timeoutId);
                removeLoadingMessage(loadingMessage);

                if (response.ok) {
                    const data = await response.json();
                    const badgeParts = ['Claude'];
                    if (data.scenario_type === 'gnn' || data.scenario_type === 'gnn_mcp') {
                        badgeParts.push('🧠 GNN');
                        if (data.scenario_type === 'gnn_mcp') badgeParts.push('🏙️ Google');
                    } else if (data.model_used?.includes('+web_search')) {
                        badgeParts.push('🌐 Web');
                    } else if (data.scenario_type === 'web_grounded') {
                        badgeParts.push('🌐 Web ⚠️');
                    }
                    if (data.model_used?.includes('+mcp')) {
                        const used = data.tools_used ? JSON.parse(data.tools_used) : [];
                        if (used.some(t => GOOGLE_TOOLS.includes(t))) badgeParts.push('🏙️ Google API');
                        if (used.some(t => TRANSIT_TOOLS.includes(t))) badgeParts.push('🚌 Transit');
                        if (used.includes('get_wikipedia_context')) badgeParts.push('📖 Wikipedia');
                    }
                    const badgeClass = data.scenario_type === 'gnn' ? 'gnn-badge' : 'msg-badge';
                    const badgeHtml = `<div><span class="${badgeClass}">${badgeParts.join('<span class="sep"> · </span>')}</span></div>`;
                    addMessage(data.answer, 'assistant', false, badgeHtml);
                } else {
                    addMessage(`שגיאה: ${response.status}`, 'assistant');
                }
            } catch (error) {
                clearTimeout(timeoutId);
                removeLoadingMessage(loadingMessage);
                if (error.name === 'AbortError') {
                    addMessage('הבקשה התעכבה יותר מדי זמן. נסה שוב.', 'assistant');
                } else if (error.message === 'Failed to fetch' || error.message.includes('fetch')) {
                    addMessage('❌ השרת לא זמין. ודא שהוא פועל על פורט 8010 ונסה שוב.', 'assistant');
                    checkServerStatus();
                } else {
                    addMessage(`שגיאה: ${error.message}`, 'assistant');
                }
            } finally {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('sendBtn2').disabled = false;
            }
        }

        function removeLoadingMessage(messageEl) {
            if (messageEl && messageEl.parentNode) {
                messageEl.remove();
            }
        }

        function addMessage(text, role, isLoading = false, badgeHtml = '') {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}${isLoading ? ' loading' : ''}`;
            const html = (role === 'assistant' && !isLoading && typeof marked !== 'undefined')
                ? marked.parse(text)
                : text.replace(/\n/g, '<br>');
            messageEl.innerHTML = `
                <div class="message-content">${html}${badgeHtml}</div>
                <div class="message-time">${new Date().toLocaleTimeString('he-IL')}</div>
            `;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageEl;
        }


        async function checkServerStatus() {
            const el = document.getElementById('serverStatus');
            try {
                const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(4000) });

                    el.textContent = '🟢 שרת פועל על פורט 8010';
                    el.className = 'server-status ok';
                } else {
                    throw new Error('bad status');
                }
            } catch {
                el.textContent = '🔴 שרת לא זמין — הפעל Ctrl+Shift+B ב-VSCode';
                el.className = 'server-status err';

        }

async function runExam() {
            const selected = Array.from(document.querySelectorAll('#examPlacesGrid input[type="checkbox"]:checked'))
                .map(cb => parseInt(cb.value));
            if (selected.length === 0) { alert('בחר לפחות מקום אחד'); return; }

            const places = EXAM_PLACES.filter(p => selected.includes(p.index));
            const question = document.getElementById('examQuestion').value || 'מה יש כאן?';

            const toolGoogle  = document.getElementById('examToolGoogle').checked;
            const toolTransit = document.getElementById('examToolTransit').checked;
            const toolWiki    = document.getElementById('examToolWiki').checked;
            const toolWeb     = document.getElementById('examToolWeb').checked;

            const enabledTools = [];
            if (toolGoogle)  enabledTools.push(...GOOGLE_TOOLS);
            if (toolTransit) enabledTools.push(...TRANSIT_TOOLS);
            if (toolWiki)    enabledTools.push('get_wikipedia_context');

            const examGnnMode = document.querySelector('input[name="examGnnMode"]:checked')?.value || 'none';
            let scenarioType;
            if (examGnnMode === 'gnn' || examGnnMode === 'gnn_mcp') {
                scenarioType = examGnnMode;
            } else {
                const hasMcp = enabledTools.length > 0;
                scenarioType = hasMcp ? 'mcp' : (toolWeb ? 'web_grounded' : 'baseline');
            }

            const progressWrap = document.getElementById('examProgressWrap');
            const progressFill = document.getElementById('examProgressFill');
            const progressText = document.getElementById('examProgressText');
            const resultsDiv = document.getElementById('examResults');
            const runBtn = document.getElementById('examRunBtn');
            const checkboxes = document.querySelectorAll('#examPlacesGrid input[type="checkbox"]');

            const totalRuns = Math.max(1, Math.min(10, parseInt(document.getElementById('examRuns').value) || 1));
            const totalItems = places.length * totalRuns;

            progressWrap.style.display = 'flex';
            resultsDiv.innerHTML = '';
            runBtn.disabled = true;
            checkboxes.forEach(cb => cb.disabled = true);
            examRunning = true;
            examResultsData = [];
            document.getElementById('examJudgeRow').style.display = 'none';
            document.getElementById('examJudgeStatus').textContent = 'שני שופטים: 🔵 Gemini (תחבורה) + 🟢 OpenAI (שפה)';

            let doneCount = 0;

            for (let run = 1; run <= totalRuns; run++) {
                if (totalRuns > 1) {
                    const sep = document.createElement('div');
                    sep.className = 'exam-run-sep';
                    sep.textContent = `ריצה ${run} / ${totalRuns}`;
                    resultsDiv.appendChild(sep);
                    resultsDiv.scrollTop = resultsDiv.scrollHeight;
                }

                for (let i = 0; i < places.length; i++) {
                    const place = places[i];
                    progressFill.style.width = `${Math.round(doneCount / totalItems * 100)}%`;
                    progressText.textContent = totalRuns > 1
                        ? `${doneCount}/${totalItems} — ריצה ${run}/${totalRuns} — ${place.name}`
                        : `${doneCount}/${totalItems} — ${place.name}`;

                    const runBadge = totalRuns > 1 ? `<span class="run-badge">ריצה ${run}</span>` : '';
                    const card = document.createElement('div');
                    card.className = 'exam-result-card exam-pending';
                    card.innerHTML = `
                        <div class="exam-result-header">${runBadge}${place.index}. ${place.name} <small>${place.city}</small></div>
                        <div class="exam-result-body">⏳ שולח בקשה...</div>`;
                    resultsDiv.appendChild(card);
                    resultsDiv.scrollTop = resultsDiv.scrollHeight;

                    try {
                        const res = await fetch(`${API_BASE}/api/v1/ask`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                lat: place.lat, lon: place.lon, question,
                                scenario_type: scenarioType,
                                enabled_tools: enabledTools,
                                use_web_search: toolWeb,
                            })
                        });
                        if (res.ok) {
                            const data = await res.json();
                            const usedTools = data.tools_used ? JSON.parse(data.tools_used) : [];
                            const badgeParts = ['Claude'];
                            if (usedTools.some(t => GOOGLE_TOOLS.includes(t))) badgeParts.push('🏙️ Google');
                            if (usedTools.some(t => TRANSIT_TOOLS.includes(t))) badgeParts.push('🚌 Transit');
                            if (usedTools.includes('get_wikipedia_context')) badgeParts.push('📖 Wikipedia');
                            if (data.model_used?.includes('+web_search')) badgeParts.push('🌐 Web');
                            card.className = 'exam-result-card exam-done';
                            card.querySelector('.exam-result-body').innerHTML =
                                (typeof marked !== 'undefined' ? marked.parse(data.answer) : data.answer) +
                                `<div class="exam-result-badge">${badgeParts.join(' · ')}</div>`;
                            examResultsData.push({
                                index: place.index, name: place.name, city: place.city,
                                lat: place.lat, lon: place.lon, question,
                                answer: data.answer,
                                scenario_type: scenarioType,
                                tools_used: usedTools,
                                run,
                            });
                        } else {
                            card.className = 'exam-result-card exam-error';
                            card.querySelector('.exam-result-body').textContent = `שגיאה ${res.status}`;
                        }
                    } catch (err) {
                        card.className = 'exam-result-card exam-error';
                        card.querySelector('.exam-result-body').textContent = `שגיאה: ${err.message}`;
                    }

                    doneCount++;
                    resultsDiv.scrollTop = resultsDiv.scrollHeight;
                }
            }

            progressFill.style.width = '100%';
            progressText.textContent = `${totalItems}/${totalItems} — הושלם ✓`;
            runBtn.disabled = false;
            checkboxes.forEach(cb => cb.disabled = false);
            examRunning = false;
            if (examResultsData.length > 0) {
                document.getElementById('examJudgeRow').style.display = 'flex';
            }
        }

        async function generateJudgingReport() {
            if (examResultsData.length === 0) return;

            const btn        = document.getElementById('examJudgeBtn');
            const status     = document.getElementById('examJudgeStatus');
            const progressWrap = document.getElementById('examJudgeProgress');
            const fill       = document.getElementById('examJudgeProgressFill');
            const ptext      = document.getElementById('examJudgeProgressText');

            btn.disabled = true;
            progressWrap.style.display = 'flex';
            fill.style.width = '0%';

            const toolNames = [];
            if (document.getElementById('examToolGoogle').checked) toolNames.push('🏙️ Google Places');
            if (document.getElementById('examToolTransit').checked) toolNames.push('🚌 Transit');
            if (document.getElementById('examToolWiki').checked)    toolNames.push('📖 Wikipedia');
            if (document.getElementById('examToolWeb').checked)     toolNames.push('🌐 Web');

            const question     = document.getElementById('examQuestion').value || 'מה יש כאן?';
            const scenarioType = examResultsData[0]?.scenario_type || 'baseline';
            const total        = examResultsData.length;
            const judgments    = [];

            try {
                for (let i = 0; i < examResultsData.length; i++) {
                    const item = examResultsData[i];
                    const runLabel = item.run > 1 ? ` (ריצה ${item.run})` : '';
                    status.textContent  = `⚖️ שופט ${i + 1}/${total}: ${item.name}${runLabel}`;
                    fill.style.width    = `${Math.round(i / total * 100)}%`;
                    ptext.textContent   = `${i}/${total}`;

                    let judgment = { gemini: { transport_score: 0 }, openai: { language_score: 0 }, final_score: 0 };
                    try {
                        const res = await fetch(`${API_BASE}/api/v1/exam/judge-one`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(item),
                        });
                        if (res.ok) judgment = await res.json();
                        else status.textContent = `⚠️ שגיאה ב-${item.name} (${res.status}) — ממשיך...`;
                    } catch (e) {
                        status.textContent = `⚠️ שגיאת רשת ב-${item.name} — ממשיך...`;
                    }

                    judgments.push({
                        place: { index: item.index, name: item.name, city: item.city,
                                 lat: item.lat, lon: item.lon, run: item.run || 1 },
                        question: item.question,
                        answer: item.answer,
                        gemini: judgment.gemini,
                        openai: judgment.openai,
                        final_score: judgment.final_score,
                    });
                }

                fill.style.width  = '100%';
                ptext.textContent = `${total}/${total}`;
                status.textContent = '📄 מייצר דוח HTML...';

                const buildRes = await fetch(`${API_BASE}/api/v1/exam/build-report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ judgments, question, scenario_type: scenarioType, tools_used: toolNames }),
                });

                if (!buildRes.ok) {
                    const err = await buildRes.json().catch(() => ({}));
                    throw new Error(err.detail || `שגיאה ${buildRes.status}`);
                }

                const data = await buildRes.json();
                status.textContent = `✅ הדוח נשמר: evaluation/${data.filename}`;
                const blob = new Blob([data.html], { type: 'text/html; charset=utf-8' });
                window.open(URL.createObjectURL(blob), '_blank');

            } catch (err) {
                status.textContent = `❌ שגיאה: ${err.message}`;
            } finally {
                btn.disabled = false;
            }
        }

        // Initialize when page loads
        window.onload = function() {
            initMap();
            checkServerStatus();
            setInterval(checkServerStatus, 10000);
            addMessage('שלום! 👋 בחר נקודה על המפה, ואז שאל שאלה.', 'assistant');
        };
    </script>
</body>
</html>
